<!DOCTYPE html>
<html>

<head>

<title>ShieldRider Plans</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<nav class="bg-indigo-600 text-white p-4 flex justify-between">
<h1 class="text-xl font-bold">ShieldRider</h1>
<a href="index.html">Home</a>
</nav>

<h2 class="text-center text-3xl font-bold mt-10">
Choose Weekly Protection Plan
</h2>

<div class="grid grid-cols-3 gap-10 px-20 mt-10">

<div id="low" class="bg-white shadow-lg p-6 rounded-lg text-center">

<h3 class="font-bold text-xl">Low Risk</h3>
<p class="text-gray-600 mt-3">Coverage ₹500</p>
<p class="text-indigo-600 text-2xl mt-4">₹20/week</p>

<button onclick="selectPlan('Low Risk','500','low')"
class="bg-indigo-600 text-white px-4 py-2 mt-4 rounded">

Select

</button>

</div>


<div id="medium" class="bg-white shadow-lg p-6 rounded-lg text-center">

<h3 class="font-bold text-xl">Medium Risk</h3>
<p class="text-gray-600 mt-3">Coverage ₹700</p>
<p class="text-indigo-600 text-2xl mt-4">₹35/week</p>

<button onclick="selectPlan('Medium Risk','700','medium')"
class="bg-indigo-600 text-white px-4 py-2 mt-4 rounded">

Select

</button>

</div>


<div id="high" class="bg-white shadow-lg p-6 rounded-lg text-center">

<h3 class="font-bold text-xl">High Risk</h3>
<p class="text-gray-600 mt-3">Coverage ₹1000</p>
<p class="text-indigo-600 text-2xl mt-4">₹50/week</p>

<button onclick="selectPlan('High Risk','1000','high')"
class="bg-indigo-600 text-white px-4 py-2 mt-4 rounded">

Select

</button>

</div>

</div>


<script>

function selectPlan(plan, coverage, id){

localStorage.setItem("plan", plan);
localStorage.setItem("coverage", coverage);

document.getElementById("low").classList.remove("border-4","border-indigo-600");
document.getElementById("medium").classList.remove("border-4","border-indigo-600");
document.getElementById("high").classList.remove("border-4","border-indigo-600");

document.getElementById(id).classList.add("border-4","border-indigo-600");

setTimeout(() => {

window.location.href = "dashboard.html";

}, 800);

}

</script>

</body>
</html>
