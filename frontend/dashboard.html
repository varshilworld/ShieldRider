<!DOCTYPE html>
<html>

<head>
<title>ShieldRider Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<nav class="bg-indigo-600 text-white p-4 flex justify-between">
<h1 class="text-xl font-bold">ShieldRider Dashboard</h1>
<a href="index.html">Home</a>
</nav>

<div class="max-w-5xl mx-auto mt-10">

<!-- Worker Profile -->
<div class="bg-white p-6 shadow rounded">
<h2 class="text-xl font-bold">Worker Profile</h2>

<p class="mt-2">Name: Ravi Kumar</p>
<p>City: Chennai</p>

<p id="plan"></p>
<p id="coverage"></p>
</div>


<!-- Simulation Controls -->
<div class="bg-white p-6 shadow rounded mt-8">

<h2 class="text-xl font-bold">Disruption Simulation</h2>

<p class="text-gray-600 mt-2">
Choose simulation mode for demo
</p>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4">

<button onclick="simulate('real')" class="bg-blue-600 text-white py-2 rounded">
🌐 Real Weather
</button>

<button onclick="simulate('heat')" class="bg-red-500 text-white py-2 rounded">
🔥 Heat
</button>

<button onclick="simulate('rain')" class="bg-indigo-500 text-white py-2 rounded">
🌧 Rain
</button>

<button onclick="simulate('pollution')" class="bg-gray-700 text-white py-2 rounded">
🌫 Pollution
</button>

</div>

<div id="loading" class="mt-6 text-blue-600 font-semibold hidden">
Checking conditions...
</div>

<div id="result" class="mt-6"></div>

</div>

</div>


<script>

/* Load Plan */
window.onload = function(){

let plan = localStorage.getItem("plan") || "Medium Risk";
let coverage = localStorage.getItem("coverage") || "700";

document.getElementById("plan").innerHTML = "Weekly Plan: " + plan;
document.getElementById("coverage").innerHTML = "Coverage: ₹" + coverage;

}


/* Simulation */
function simulate(mode){

document.getElementById("result").innerHTML = "";
document.getElementById("loading").classList.remove("hidden");

fetch(`http://127.0.0.1:5000/simulate-event?mode=${mode}`)

.then(res => res.json())

.then(data => {

document.getElementById("loading").classList.add("hidden");

document.getElementById("result").innerHTML =

`
<div class="bg-green-100 border border-green-400 p-6 rounded-lg">

<h3 class="text-xl font-bold text-green-800">
${data.mode || "Simulation"}
</h3>

<p class="mt-2">Event: ${data.event}</p>
<p>Measured Value: ${data.value}</p>

<p class="mt-4 text-2xl font-bold text-green-700">
Payout: ₹${data.payout}
</p>

</div>
`;

});

}

</script>

</body>
</html>
